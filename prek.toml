files= ".*\\.py$"

# prek doesn't have such feature in the config, we don't need it tbh
# [[ci]]
# autofix_prs = true

[auto_update]
cooldown_days = 90

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.12"
hooks = [
    # Run the linter (solely for --fix part).
    # When we need linting - it's handled by `.github/workflows/type_lint_test.yml`
    { id = "ruff-check", args = [
        "--fix",
        "--exit-non-zero-on-fix",
    ] },
    # Run the formatter.
    { id = "ruff-format" },
]

