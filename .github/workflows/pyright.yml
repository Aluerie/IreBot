name: Run pyright.

on: [ push, pull_request ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        id: install-deps
        run: |
          python -m pip install -U -r requirements.txt --upgrade pip

      - name: Run Pyright
        uses: jakebailey/pyright-action@v2
