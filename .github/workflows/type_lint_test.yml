name: Type / Lint / Test

on:
  push:
  pull_request:
    branches:
      - master
    types:
      - opened
      - reopened
      - synchronize

jobs:
  type-test-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync
  
      - name: Pyright Type Checking
        run: uv run pyright

      - name: Ruff Lint Checking
        run: uv run make lint

      - name: Pytest Tests
        run: uv run make tests
        env:
          PROJECT_NAME: "irebot"
