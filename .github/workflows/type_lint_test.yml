name: Type / Lint / Test

on:
  push:
  pull_request:
    branches:
      - master
    types:
      - opened
      - reopened
      - synchronize

jobs:
  type-test-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync
  
      - name: Pyright Type Checking
        run: uv run pyright

      - name: Ruff Lint Checking
        run: uv run make lint

      - name: Pytest Tests
        run: uv run make tests
        env:
          # it doesn't need any real .env values, just so pydantic doesn't crash out
          PROJECT_NAME: irebot
          TWITCH_CLIENT_ID: str
          TWITCH_CLIENT_SECRET: str
          POSTGRES_VPS: str
          POSTGRES_HOME: str
          STEAM_FRIEND_IRENE_ID64: 0
          STEAM_FRIEND_IRENE_ID32: 0
          STEAM_IRENESTEST_USERNAME: str
          STEAM_IRENESTEST_PASSWORD: str
          STEAM_IRENESBOT_USERNAME: str
          STEAM_IRENESBOT_PASSWORD: str
          STRATZ_BEARER: str
          STEAM_API_KEY: str
          SPOTIFY_AIDENWALLIS: str
          EVENTSUB: str
          WEBHOOK_LOGGER: str
          WEBHOOK_ERROR: str
          WEBHOOK_STREAM_NOTIFS: str
