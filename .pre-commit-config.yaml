# Pre-commit Config
# -----------------
# * https://pre-commit.com/
# * However, I use prek https://prek.j178.dev
#   as a "better pre-commit" tool with quite a few solid improvements.
#   It supports file `.pre-commit-config.yaml` format too.
# * `ci: autofix_prs` is exclusively https://pre-commit.ci (".ci" ending, not ".com") feature though AFAIK.

ci:
  autofix_prs: true

files: .*\.py$

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      # Run the linter (solely for --fix part).
      # When we need linting - it's handled by `.github/workflows/type_lint_test.yml`
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      # Run the formatter.
      - id: ruff-format
