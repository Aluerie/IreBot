# Pre-commit Config
# -----------------
# For more visit https://pre-commit.com/

ci:
  autofix_prs: true

files: .*\.py$

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      # Run the linter (solely for --fix part).
      # When we need linting - it's handled by `.github/workflows/type_lint_test.yml`
      - id: ruff-check
        args: [ --fix, --exit-zero ]
      # Run the formatter.
      - id: ruff-format

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.14
    hooks:
      - id: uv-lock
